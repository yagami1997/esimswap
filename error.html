<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>__ERROR_CODE__ __ERROR_TITLE__</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/error.js" defer></script>
</head>
<body class="error-gate-body">
    <main class="error-gate">
        <section class="error-gate-panel">
            <div class="error-gate-brand">eSIM Gate</div>
            <p class="error-gate-kicker">ERROR __ERROR_CODE__</p>
            <h1 class="error-gate-code">__ERROR_CODE__</h1>
            <h2>__ERROR_TITLE__</h2>
            <p class="error-gate-copy">__ERROR_MESSAGE__</p>

            <section class="error-gate-redirect" aria-label="Redirect notice">
                <div class="error-gate-spinner" aria-hidden="true"></div>
                <h3>Redirecting</h3>
                <p>Automatically redirecting in <strong id="redirectCountdown">5</strong> seconds.</p>
                <a id="cloudflareRedirect" class="btn btn-primary error-gate-button" href="https://www.cloudflare.com/" rel="nofollow">Go now</a>
                <noscript>
                    <p class="error-gate-noscript">JavaScript is disabled. Use the button to continue.</p>
                </noscript>
            </section>

            <footer class="error-gate-footer">
                Public errors are intentionally brief.
            </footer>
        </section>
    </main>
</body>
</html>
